# Lyntai CI — the same devtools loop a developer runs locally, on both OSes the library targets.
# Every test/e2e call goes through the deterministic provider-stub: zero real tokens, no secrets.
name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: node devtools/dev.mjs build

      - name: Test
        run: node devtools/dev.mjs test

      - name: E2E (Playground vs provider-stub)
        run: node devtools/dev.mjs e2e all

      - name: Pack
        run: node devtools/dev.mjs pack

      - name: Sensitive-info tree scan
        run: node devtools/scripts/check-sensitive.mjs --tree
